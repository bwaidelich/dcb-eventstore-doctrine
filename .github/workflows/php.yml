name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:

  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.4'
        dependencies:
          - 'lowest'
          - 'highest'
        database:
          - image: 'mysql:8.0'
            health-cmd: 'mysqladmin ping'
          - image: 'mysql:8.4'
            health-cmd: 'mysqladmin ping'
          - image: 'mariadb:10.11'
            health-cmd: 'mariadb-admin ping'
          - image: 'mariadb:11.4'
            health-cmd: 'mariadb-admin ping'

    services:
      database:
        image: ${{ matrix.database.image }}
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: dcb
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: dcb
        ports:
          - 3307:3306
        options: >-
          --health-cmd="${{ matrix.database.health-cmd }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo_mysql

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install lowest dependencies
        if: matrix.dependencies == 'lowest'
        run: composer update --prefer-dist --prefer-lowest --no-progress

      - name: Install locked dependencies
        if: matrix.dependencies == 'locked'
        run: composer install --prefer-dist --no-progress

      - name: Install highest dependencies
        if: matrix.dependencies == 'highest'
        run: composer update --prefer-dist --no-progress

      - name: Set DSN
        run: echo "DCB_TEST_DSN=pdo-mysql://root:password@127.0.0.1:3307/dcb" >> $GITHUB_ENV

      - name: Run integration tests
        run: composer run-script test:integration

      - name: Run consistency tests
        run: composer run-script test:consistency
