name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  coding-standards:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version:
          - '8.3'
        dependencies:
          - 'highest'

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install lowest dependencies
        if: matrix.dependencies == 'lowest'
        run: composer update --prefer-dist --prefer-lowest --no-progress

      - name: Install locked dependencies
        if: matrix.dependencies == 'locked'
        run: composer install --prefer-dist --no-progress

      - name: Install highest dependencies
        if: matrix.dependencies == 'highest'
        run: composer update --prefer-dist --no-progress

      - name: Check coding standards
        run: composer run-script test:cs

  static-code-analysis:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version:
          - '8.3'
        dependencies:
          - 'highest'

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install lowest dependencies
        if: matrix.dependencies == 'lowest'
        run: composer update --prefer-dist --prefer-lowest --no-progress

      - name: Install locked dependencies
        if: matrix.dependencies == 'locked'
        run: composer install --prefer-dist --no-progress

      - name: Install highest dependencies
        if: matrix.dependencies == 'highest'
        run: composer update --prefer-dist --no-progress

      - name: Run static code analysis
        run: composer run-script test:phpstan

  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.3'
          - '8.4'
          - '8.5'
        dependencies:
          - 'highest'
        database:
          - 'mysql'
          - 'postgres'
          - 'sqlite'

    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: false
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: dcb
        ports:
          - 3306/tcp
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: dcb
        ports:
          - 5432/tcp
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo_mysql, pdo_sqlite, pdo_pgsql

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install lowest dependencies
        if: matrix.dependencies == 'lowest'
        run: composer update --prefer-dist --prefer-lowest --no-progress

      - name: Install locked dependencies
        if: matrix.dependencies == 'locked'
        run: composer install --prefer-dist --no-progress

      - name: Install highest dependencies
        if: matrix.dependencies == 'highest'
        run: composer update --prefer-dist --no-progress

      - name: Derive database name
        run: echo "DB_NAME=dcb_$(echo '${{ matrix.php-version }}' | tr -d '.')" >> $GITHUB_ENV

      - name: Create MySQL database
        if: matrix.database == 'mysql'
        run: mysql --user=root --password=password --host=127.0.0.1 --port=${{ job.services.mysql.ports['3306'] }} -e "CREATE DATABASE ${{ env.DB_NAME }};"

      - name: Create PostgreSQL database
        if: matrix.database == 'postgres'
        run: PGPASSWORD=password psql -h 127.0.0.1 -p ${{ job.services.postgres.ports['5432'] }} -U root -c "CREATE DATABASE ${{ env.DB_NAME }};"

      - name: Set DSN
        run: |
          case "${{ matrix.database }}" in
            mysql) echo "DCB_TEST_DSN=pdo-mysql://root:password@127.0.0.1:${{ job.services.mysql.ports['3306'] }}/${{ env.DB_NAME }}" >> $GITHUB_ENV ;;
            postgres) echo "DCB_TEST_DSN=pdo-pgsql://root:password@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/${{ env.DB_NAME }}" >> $GITHUB_ENV ;;
            sqlite) echo "DCB_TEST_DSN=pdo-sqlite:///${{ env.DB_NAME }}.sqlite" >> $GITHUB_ENV ;;
          esac

      - name: Run integration tests
        run: composer run-script test:integration

      - name: Run consistency tests
        run: composer run-script test:consistency
